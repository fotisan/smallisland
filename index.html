<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Small Island Transfer</title>
  <meta name="description" content="Private transfers across Rhodes & the Dodecanese. One message and it's sorted." />

  <link rel="preload" as="image" href="hero-mobile.webp" media="(max-width: 767px)" fetchpriority="high">
  <link rel="preload" as="image" href="hero.webp" media="(min-width: 768px)" fetchpriority="high">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" media="print" onload="this.media='all'">

  <style>
    :root {
      --bg: #faf9f6; 
      --text: #2c3632; 
      --font: "Inter", "Roboto", Arial, sans-serif;
      --serif: "Playfair Display", Georgia, serif;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      width:100%;height:100%;margin:0;
      font-family:var(--font);
      background-color:var(--bg);
      /* Ενσωμάτωση του gradient εδώ για να μην αλλάζει η οθόνη μετά τη φόρτωση */
      background-image: radial-gradient(circle at 10% 20%, rgba(94, 140, 133, 0.08) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(214, 180, 152, 0.1) 0%, transparent 40%);
      overflow-x:hidden;color:var(--text);line-height:1.6;
    }
    .main-header{position:fixed;top:15px;left:50%;transform:translateX(-50%);width:calc(100% - 30px);max-width:1200px;background:rgba(255,255,255,.9);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.5);border-radius:40px;display:flex;justify-content:space-between;align-items:center;padding:10px 15px;z-index:1000;box-shadow:0 4px 15px rgba(0,0,0,.05)}
    .hero-section{display:block;width:100%;background-color:transparent!important;position:relative}
    .hero-main-img{width:100%;height:100%;object-fit:cover;object-position:center 75%;display:block}
    .main-title{font-family:var(--serif);font-size:26px;font-weight:700;line-height:1.15;color:var(--text);margin-bottom:8px}
    .scroll-animate{opacity:0}
    .scroll-animate.is-visible{animation:fadeInUp 0.8s ease-out forwards}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:767px){.hero-picture-wrapper{height:68svh}}
    @media(min-width:768px){
      .main-title{font-size:58px}
      .hero-section{display:flex;align-items:flex-end;min-height:700px;max-width:1200px;width:calc(100% - 30px);margin:120px auto 40px auto;border-radius:30px;overflow:hidden;}
    }
  </style>

  <link rel="stylesheet" href="styles.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="fa-custom.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
</head>

<body>

  <header class="main-header">
    <div class="logo-wrapper">
      <div class="logo-text" style="display:flex; flex-direction:column; font-size:11px; font-weight:700;"><span>SMALL ISLAND</span><span>TRANSFER</span></div>
    </div>
    <button class="hamburger-btn" style="background:transparent; border:none; font-size:24px;" onclick="toggleMenu(event)">
      <i class="fa-solid fa-bars" id="menu-icon"></i>
    </button>
    <nav class="top-nav" id="topNav" style="display:none;">
      </nav>
  </header>

  <section class="hero-section" id="home">
    <picture class="hero-picture-wrapper">
      <source media="(min-width: 768px)" srcset="hero.webp">
      <img src="hero-mobile.webp" alt="Private transfer in Rhodes" class="hero-main-img" fetchpriority="high">
    </picture>
    <main class="hero-content" style="background-color:var(--bg); border-top-left-radius:30px; border-top-right-radius:30px; margin-top:-85px; padding:30px 20px 0 20px; position:relative; z-index:10;">
      <div class="top-content" style="text-align:center;">
        <h1 class="main-title">Your Private Transfer across Rhodes & The Islands.</h1>
        <p style="font-size:14px; color:#444;">One message and it's sorted.</p>
      </div>
      <div class="cta-group" id="heroCtaGroup" style="display:flex; flex-direction:column; gap:12px; margin-top:20px;">
        <a href="#" class="primary-btn" style="background:#1A365D; color:#fff; text-decoration:none; padding:15px; border-radius:50px; text-align:center;">Let's Plan Your Route</a>
      </div>
    </main>
  </section>

  <section class="destinations" id="routes">
    <div class="container">
      <h2 class="section-title">Explore Our Destinations</h2>
      <div class="dest-grid">
        <article class="dest-card">
          <div class="dest-media">
            <img src="dest-symi.webp" srcset="dest-symi-320.webp 320w, dest-symi.webp 400w" sizes="(max-width: 767px) 140px, 300px" alt="Symi" loading="lazy">
          </div>
          <div class="dest-info">
            <h3 class="dest-name">Symi</h3>
            <a href="symi.html" class="dest-btn">Explore</a>
          </div>
        </article>
        </div>
    </div>
  </section>

  <script>
    // ΜΗΔΕΝΙΚΟ FORCED REFLOW - Χρήση IntersectionObserver για τα κουκκίδια
    window.addEventListener('load', function() {
      const slider = document.getElementById('testimonialSlider');
      const cards = document.querySelectorAll('.test-card');
      const dots = document.querySelectorAll('.slider-dots .dot');
      if (!slider || cards.length === 0) return;

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const index = Array.from(cards).indexOf(entry.target);
            dots.forEach(d => d.classList.remove('active'));
            if (dots[index]) dots[index].classList.add('active');
          }
        });
      }, { root: slider, threshold: 0.6 });

      cards.forEach(card => observer.observe(card));
    });

    function toggleMenu() {
      document.getElementById("topNav").classList.toggle("active");
    }
  </script>
</body>
</html>
